services:
  lia-core:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "node dist/scripts/migrate.js && node dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lia_core
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lia_core
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lia_core"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - lia_core_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  lia_core_pgdata:
