services:
  lia-core:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lia_core
      HTTP_INTERNAL_API_KEY: ${HTTP_INTERNAL_API_KEY:?HTTP_INTERNAL_API_KEY is required}
      HTTP_GATEWAY_API_KEY: ${HTTP_GATEWAY_API_KEY:?HTTP_GATEWAY_API_KEY is required}
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  lia-core-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/mcp/server.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lia_core
      HTTP_INTERNAL_API_KEY: ${HTTP_INTERNAL_API_KEY:?HTTP_INTERNAL_API_KEY is required}
      HTTP_GATEWAY_API_KEY: ${HTTP_GATEWAY_API_KEY:?HTTP_GATEWAY_API_KEY is required}
      LOG_LEVEL: info
      MCP_PORT: 3100
      MCP_API_KEY: ${MCP_API_KEY:?MCP_API_KEY is required}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,lia-core-mcp,host.docker.internal}
      MCP_ENABLE_JSON_RESPONSE: ${MCP_ENABLE_JSON_RESPONSE:-true}
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      lia-core:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lia_core
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lia_core"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - lia_core_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  lia_core_pgdata:
