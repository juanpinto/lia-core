app = "lia-core-mcp"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 15

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  MCP_PORT = "3100"
  LOG_LEVEL = "info"
  MCP_ENABLE_JSON_RESPONSE = "true"

[processes]
  app = "node dist/mcp/server.js"

[http_service]
  internal_port = 3100
  processes = ["app"]
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  force_https = false

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/ready"
    timeout = "5s"
